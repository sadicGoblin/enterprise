<div class="smart-selector-wrapper">
  <!-- Normal mat-select for ≤ threshold items -->
  <ng-container *ngIf="!isAutocomplete">
    <mat-form-field appearance="outline" class="selector-field">
      <mat-label>{{ label }}</mat-label>
      <mat-select
        [value]="selectedValue"
        (selectionChange)="onSelectChange($event.value)"
        [required]="required"
        [disabled]="disabled"
        [placeholder]="placeholder">
        <mat-option [value]="null">-- {{ placeholder }} --</mat-option>
        <mat-option *ngFor="let opt of options" [value]="opt.value">
          {{ opt.label }}
          <span class="option-sublabel" *ngIf="opt.sublabel"> ({{ opt.sublabel }})</span>
        </mat-option>
      </mat-select>
      <mat-error *ngIf="errorMessage">{{ errorMessage }}</mat-error>
    </mat-form-field>
  </ng-container>

  <!-- Autocomplete for > threshold items -->
  <ng-container *ngIf="isAutocomplete">
    <mat-form-field appearance="outline" class="selector-field">
      <mat-label>{{ label }}</mat-label>
      <input matInput
        [formControl]="searchControl"
        [matAutocomplete]="auto"
        [placeholder]="placeholder"
        [required]="required"
        (blur)="onAutocompleteClosed()">
      <button mat-icon-button matSuffix *ngIf="searchControl.value"
        (click)="clearAutocomplete()" matTooltip="Limpiar" type="button">
        <mat-icon>close</mat-icon>
      </button>
      <button mat-icon-button matSuffix *ngIf="!searchControl.value" type="button">
        <mat-icon>search</mat-icon>
      </button>
      <mat-autocomplete #auto="matAutocomplete"
        (optionSelected)="onAutocompleteSelected($event.option.value)"
        [displayWith]="displayFn">
        <mat-option *ngFor="let opt of filteredOptions$ | async" [value]="opt">
          <span>{{ opt.label }}</span>
          <span class="option-sublabel" *ngIf="opt.sublabel"> — {{ opt.sublabel }}</span>
        </mat-option>
        <mat-option *ngIf="(filteredOptions$ | async)?.length === 0" disabled>
          Sin resultados
        </mat-option>
      </mat-autocomplete>
      <mat-error *ngIf="errorMessage">{{ errorMessage }}</mat-error>
    </mat-form-field>
  </ng-container>

  <!-- Action buttons (Django admin style) -->
  <div class="selector-actions">
    <button mat-icon-button
      *ngIf="showAdd"
      (click)="onAddClicked($event)"
      matTooltip="Agregar nuevo"
      type="button"
      class="action-btn add-btn">
      <mat-icon>add_circle_outline</mat-icon>
    </button>
    <button mat-icon-button
      *ngIf="showEdit && hasValue"
      (click)="onEditClicked($event)"
      matTooltip="Editar seleccionado"
      type="button"
      class="action-btn edit-btn">
      <mat-icon>edit</mat-icon>
    </button>
  </div>
</div>
